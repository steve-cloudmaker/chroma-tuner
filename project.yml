name: ChromaTuner
targets:
  ChromaTuner:
    type: application
    platform: iOS
    sources: [ChromaTuner]
    deploymentTarget: "17.0"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.stevecloudmaker.chromatuner
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: chroma-tuner
      INFOPLIST_KEY_NSMicrophoneUsageDescription: Microphone access is required to detect pitch when tuning instruments.
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      TARGETED_DEVICE_FAMILY: "1,2"
